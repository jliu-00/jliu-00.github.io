
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.liu</title>
    <meta name="description" content="J.liu - Personal Portfolio and Creative Archive" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" as="image" href="/bridge.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/airplane.webp" fetchpriority="high" />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
